            'with glowing kind eyes and a soft cheerful smile',
            'with a tender bright-eyed look full of warmth',
            'with a gentle joyful expression and soft smiling eyes',
            'with a soft elegant smile and eyes full of kindness',
            'with a luminous gentle gaze radiating warmth and joy'
        ];

        // Shuffle all arrays on load
        const characters    = shuffleArray(originalCharacters);
        const outfitsSingle = shuffleArray(originalOutfitsSingle);
        const outfitsPair   = shuffleArray(originalOutfitsPair);
        const actions       = shuffleArray(originalActions);
        const companions    = shuffleArray(originalCompanions);
        const locations     = shuffleArray(originalLocations);
        const times         = shuffleArray(originalTimes);
        const phenomena     = shuffleArray(originalPhenomena);
        const moods         = shuffleArray(originalMoods);
        const aesthetics    = shuffleArray(originalAesthetics);
        const colors        = shuffleArray(originalColors);
        const details       = shuffleArray(originalDetails);
        const expressions   = shuffleArray(originalExpressions);

        // feminine clothing / accessory detector (dresses, skirts, pinafores, flower crowns)
        const FEM = /dress|pinafore|skirt|sundress|flower crown|gown|bonnet|blouse/i;

        // ====== STATE ======
        let idea = null;
        let isGenerating = false;
        let copied = false;
        let generatedThisSession = 0;
        let copyTimer = null;
        let styleMode = 'storybook'; // 'storybook' | 'signature'

        function freshUsed() {
            return {
                characters: new Set(), outfitsSingle: new Set(), outfitsPair: new Set(),
                actions: new Set(), companions: new Set(), locations: new Set(),
                times: new Set(), phenomena: new Set(), moods: new Set(),
                aesthetics: new Set(), colors: new Set(), details: new Set(), expressions: new Set()
            };
        }
        let usedIndices = freshUsed();

        // pick a random index that satisfies pred (optional) and avoids recent repeats
        function pick(arr, usedSet, pred) {
            const allowed = [];
            for (let i = 0; i < arr.length; i++) {
                if (!pred || pred(arr[i])) allowed.push(i);
            }
            const fresh = allowed.filter(function (i) { return !usedSet.has(i); });
            const pool = fresh.length ? fresh : allowed;
            const idx = pool[getTrulyRandomInt(pool.length)];
            usedSet.add(idx);
            return idx;
        }

        function phrase(parts) {
            return parts.filter(Boolean).join(' ').replace(/\s+/g, ' ').trim();
        }
        function cap(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

        // build the final prompt for a given scene + current style mode
        function buildPrompt(p) {
            const subject = phrase([p.character, p.outfit]);
            const signature = (styleMode === 'signature');
            let code = (document.getElementById('srefInput').value || '').trim();
            // if the user typed a full parameter (--sref / --profile / --p ...), keep it as-is;
            // if they typed a bare number/code, assume it's an --sref
            if (code && !/^--/.test(code)) code = '--sref ' + code;
            const srefSuffix = (signature && code) ? (' ' + code) : '';
            const suffix = ' --ar 9:16 --v 7' + srefSuffix;

            let tail, structures;
            if (signature) {
                // clean scene only — no style/render words that fight the --sref look
                tail = [
                    p.expression, p.time, p.phenomenon, p.mood + ' atmosphere',
                    'sunny and full of warmth and kindness',
                    'a soft gentle closed-lip smile, elegant and graceful'
                ].join(', ');
                structures = [
                    phrase([subject, p.companion, p.action, p.location]) + ', ' + tail + suffix,
                    phrase([cap(p.location) + ',', subject, p.companion, p.action]) + ', ' + tail + suffix,
                    phrase([subject, p.action, p.location, p.companion]) + ', ' + p.expression + ', ' + p.mood + ' mood, ' +
                        [p.time, p.phenomenon, 'sunny and full of warmth and kindness', 'a soft gentle closed-lip smile, elegant and graceful'].join(', ') + suffix
                ];
            } else {
                tail = [
                    p.expression, p.time, p.phenomenon, p.mood + ' atmosphere',
                    'sunny, joyful and full of warmth and kindness',
                    'a soft gentle closed-lip smile, elegant and graceful',
                    p.aesthetic, 'color palette: ' + p.color, p.detail,
                    'wholesome and heartwarming', 'saturated colors', 'beautiful composition'
                ].join(', ');
                structures = [
                    phrase([subject, p.companion, p.action, p.location]) + ', ' + tail + suffix,
                    phrase([cap(p.location) + ',', subject, p.companion, p.action]) + ', ' + tail + suffix,
                    phrase([subject, p.action, p.location, p.companion]) + ', ' + p.expression + ', ' + p.mood + ' mood, ' +
                        [p.time, p.phenomenon, 'sunny and joyful, radiating warmth and kindness', 'a soft gentle closed-lip smile, elegant and graceful', p.aesthetic, 'color palette: ' + p.color, p.detail, 'heartwarming and wholesome', 'saturated colors'].join(', ') + suffix
                ];
            }
            return structures[getTrulyRandomInt(structures.length)];
        }

        // ====== GENERATE ======
        function generateIdea() {
            if (isGenerating) return;
            isGenerating = true;
            copied = false;
            render();

            setTimeout(function () {
                const U = usedIndices;

                const character = characters[pick(characters, U.characters, null)];
                const g = character.g;
                const hasBoy = (g === 'boy' || g === 'mixed');
                const isPair = (g === 'girls' || g === 'mixed');

                const notFem = function (s) { return !FEM.test(s); };
                const noCrown = function (s) { return !/flower crown/i.test(s); };

                let outfit;
                if (isPair) {
                    outfit = outfitsPair[pick(outfitsPair, U.outfitsPair, hasBoy ? notFem : null)];
                } else {
                    outfit = outfitsSingle[pick(outfitsSingle, U.outfitsSingle, hasBoy ? notFem : null)];
                }

                const action     = actions[pick(actions, U.actions, hasBoy ? noCrown : null)];
                let companion   = companions[pick(companions, U.companions, null)];
                // rare: a sleek black cat occasionally appears instead
                if (companion && getTrulyRandomInt(100) < 6) companion = 'with a sleek black cat';
                const location   = locations[pick(locations, U.locations, null)];
                const time       = times[pick(times, U.times, null)];
                const phenomenon = phenomena[pick(phenomena, U.phenomena, null)];
                const mood       = moods[pick(moods, U.moods, null)];
                const aesthetic  = aesthetics[pick(aesthetics, U.aesthetics, null)];
                const color      = colors[pick(colors, U.colors, null)];
                const detail     = details[pick(details, U.details, null)];
                const expression = expressions[pick(expressions, U.expressions, null)];

                const parts = {
                    character: character.t, outfit: outfit, companion: companion,
                    action: action, location: location, time: time,
                    phenomenon: phenomenon, mood: mood, aesthetic: aesthetic,
                    color: color, detail: detail, expression: expression
                };
                const prompt = buildPrompt(parts);

                // tags
                const fullText = (character.t + ' ' + companion + ' ' + action + ' ' + location + ' ' + phenomenon).toLowerCase();
                const tags = [];
                if (/beach|sea|shore|ocean|wave|jetty|harbour|lighthouse|sand|dolphin|cove|pier|tide|rock pool/.test(fullText)) tags.push('seaside');
                if (/garden|orchard|pond|greenhouse|cottage|vegetable|strawberry|well/.test(fullText)) tags.push('garden');
                if (/forest|woodland|pine|stream|waterfall|den/.test(fullText)) tags.push('woodland');
                if (/field|meadow|wheat|sunflower|poppy|daisy|hay|buttercup/.test(fullText)) tags.push('meadow');
                if (/lavender/.test(fullText)) tags.push('lavender');
                if (/treehouse|tree|branch/.test(fullText)) tags.push('treehouse');
                if (/attic|trunk|photograph/.test(fullText)) tags.push('attic');
                if (/lake|raft|riverbank|river|campsite|bridge/.test(fullText)) tags.push('lakeside');
                if (companion && /kitten|puppy|bunny|rabbit|lamb|fawn|duck|pony|fox|hedgehog|cat|goat|sheep|raccoon|chick|retriever|terrier|labrador|spaniel|cockapoo|maine coon|ragdoll/.test(companion.toLowerCase())) tags.push('animals');
                if (/treasure|map|hike|binocular|compass/.test(fullText)) tags.push('adventure');
                if (/book|read|sketch|notebook/.test(fullText)) tags.push('reading');
                tags.push('summer', 'cosy');
                const finalTags = tags.slice(0, 6);

                idea = {
                    title: cap(action),
                    description: cap(phrase([character.t, outfit, companion]) + ', ' + action + ' ' + location + '. ' + cap(mood) + ', ' + aesthetic + '.'),
                    tags: finalTags,
                    prompt: prompt,
                    parts: parts
                };

                generatedThisSession += 1;
                isGenerating = false;
                render();
            }, 1000);
        }

        // ====== RESET (immediately generates a fresh idea) ======
        function handleReshuffle() {
            usedIndices = freshUsed();
            generatedThisSession = 0;
            idea = null;
            copied = false;
            generateIdea();
        }

        // ====== COPY ======
        async function copyToClipboard(text) {
            try {
                await navigator.clipboard.writeText(text);
                markCopied();
            } catch (err) {
                try {
                    const textArea = document.createElement('textarea');
                    textArea.value = text;
                    textArea.style.position = 'fixed';
                    textArea.style.left = '-999999px';
                    document.body.appendChild(textArea);
                    textArea.select();
                    document.execCommand('copy');
                    document.body.removeChild(textArea);
                    markCopied();
                } catch (fallbackErr) {
                    alert('Failed to copy. Please copy manually.');
                }
            }
        }

        function markCopied() {
            copied = true;
            render();
            if (copyTimer) clearTimeout(copyTimer);
            copyTimer = setTimeout(function () { copied = false; render(); }, 2000);
        }

        // ====== RENDER ======
        function el(tag, props, children) {
            const node = document.createElement(tag);
            if (props) {
                for (const k in props) {
                    if (k === 'class') node.className = props[k];
                    else if (k === 'style') node.setAttribute('style', props[k]);
                    else if (k === 'text') node.textContent = props[k];
                    else node.setAttribute(k, props[k]);
                }
            }
            (children || []).forEach(function (c) {
                if (typeof c === 'string') node.appendChild(document.createTextNode(c));
                else if (c) node.appendChild(c);
            });
            return node;
        }

        function render() {
            document.getElementById('count').textContent = generatedThisSession;

            const genIcon = document.getElementById('genIcon');
            const genText = document.getElementById('genText');
            const genBtn = document.getElementById('generateBtn');
            genIcon.textContent = isGenerating ? '🔄' : '✨';
            genText.textContent = isGenerating ? 'Generating Magic...' : 'Generate New Idea';
            genText.className = isGenerating ? 'spin' : '';
            genBtn.disabled = isGenerating;

            const result = document.getElementById('result');
            result.innerHTML = '';

            if (isGenerating) return;

            if (idea) {
                const card = el('div', { class: 'idea-card' }, [
                    el('div', { class: 'idea-header' }, [
                        el('div', { class: 'icon-box' }, [ el('span', { style: 'font-size: 1.5rem;', text: '☀️' }) ]),
                        el('div', { style: 'flex: 1;' }, [ el('h2', { class: 'idea-title', text: idea.title }) ])
                    ]),
                    el('div', { class: 'description-box' }, [
                        el('p', { class: 'description-text', text: idea.description })
                    ]),
                    el('div', { class: 'tags-container' },
                        idea.tags.map(function (tag) { return el('span', { class: 'tag', text: '#' + tag }); })
                    ),
                    (function () {
                        const copyBtn = el('button', { class: 'copy-button' }, [
                            el('span', { text: copied ? '✓' : '📋' }),
                            el('span', { text: copied ? 'Copied!' : 'Copy to Clipboard' })
                        ]);
                        copyBtn.addEventListener('click', function () { copyToClipboard(idea.prompt); });
                        return el('div', { class: 'prompt-box' }, [
                            el('div', { class: 'prompt-header' }, [
                                el('span', { text: '🖼️' }),
                                el('span', { text: 'AI Art Prompt (ready to copy)' })
                            ]),
                            el('p', { class: 'prompt-text', text: idea.prompt }),
                            copyBtn
                        ]);
                    })()
                ]);
                result.appendChild(card);
            } else {
                const placeholder = el('div', { class: 'text-center', style: 'color: #cffafe; margin-bottom: 2rem;' }, [
                    el('p', { style: 'font-size: 1.125rem; margin-bottom: 1rem;', text: '🌻 Tap the button above to generate your first summer idea!' }),
                    el('p', { style: 'font-size: 0.875rem; color: #7dd3fc;', text: 'Every prompt is a cosy, one-of-a-kind summer scene.' })
                ]);
                result.appendChild(placeholder);
            }
        }

        // ====== INIT ======
        function setMode(mode) {
            styleMode = mode;
            document.getElementById('modeStorybook').classList.toggle('active', mode === 'storybook');
            document.getElementById('modeSignature').classList.toggle('active', mode === 'signature');
            document.getElementById('srefRow').classList.toggle('show', mode === 'signature');
            if (idea && !isGenerating) { idea.prompt = buildPrompt(idea.parts); render(); }
        }
        document.getElementById('modeStorybook').addEventListener('click', function () { setMode('storybook'); });
        document.getElementById('modeSignature').addEventListener('click', function () { setMode('signature'); });
        document.getElementById('srefInput').addEventListener('input', function () {
            if (styleMode === 'signature' && idea && !isGenerating) { idea.prompt = buildPrompt(idea.parts); render(); }
        });

        document.getElementById('generateBtn').addEventListener('click', generateIdea);
        document.getElementById('resetBtn').addEventListener('click', handleReshuffle);
        render();
    </script>
</body>
</html>
