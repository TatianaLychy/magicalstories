<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Artist's Vision · by Tatiana Lychy</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-deep:    #0a1a0e;
            --bg-mid:     #1a3a1f;
            --bg-light:   #2d5a27;
            --gold:       #d4af37;
            --gold-dim:   rgba(212,175,55,0.35);
            --gold-glow:  rgba(212,175,55,0.12);
            --cream:      #f0e6c8;
            --sage:       #a8c5a0;
            --sage-dim:   #6a9e62;
            --panel:      rgba(13,32,22,0.72);
            --border:     rgba(212,175,55,0.18);
        }

        body {
            font-family: Georgia, 'Times New Roman', serif;
            min-height: 100vh;
            background:
                linear-gradient(160deg, #0a1a0e 0%, #1a3a1f 35%, #2d5a27 65%, #1a3a1f 85%, #0a1a0e 100%);
            background-attachment: fixed;
            overflow-x: hidden;
            color: var(--cream);
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse at 20% 10%, rgba(212,175,55,0.055) 0%, transparent 55%),
                radial-gradient(ellipse at 80% 90%, rgba(212,175,55,0.045) 0%, transparent 55%),
                radial-gradient(ellipse at 50% 50%, rgba(45,90,39,0.2) 0%, transparent 65%);
            pointer-events: none;
            z-index: 0;
        }

        /* ── LAYOUT ── */
        .page {
            position: relative;
            z-index: 1;
            max-width: 820px;
            margin: 0 auto;
            padding: 0 1.25rem 4rem;
        }

        /* ── COPYRIGHT ── */
        .copyright {
            position: fixed;
            top: 1rem;
            right: 1rem;
            background: rgba(10,26,14,0.82);
            backdrop-filter: blur(14px);
            padding: 0.38rem 0.9rem;
            border-radius: 0.45rem;
            border: 1px solid var(--gold-dim);
            z-index: 999;
            color: var(--gold);
            font-size: 0.76rem;
            font-style: italic;
            letter-spacing: 0.04em;
        }

        /* ── HEADER ── */
        .header {
            text-align: center;
            padding: 3.5rem 0 2.5rem;
        }

        .header-ornament {
            display: block;
            color: var(--gold);
            font-size: 0.85rem;
            letter-spacing: 0.55em;
            margin-bottom: 1.4rem;
            opacity: 0.7;
        }

        .header-title {
            font-size: 3rem;
            font-weight: normal;
            color: var(--cream);
            letter-spacing: 0.06em;
            line-height: 1.15;
            text-shadow: 0 2px 24px rgba(212,175,55,0.2);
            margin-bottom: 0.3rem;
        }

        .header-title em {
            font-style: italic;
            color: var(--gold);
        }

        .header-sub {
            font-size: 0.95rem;
            color: var(--sage);
            font-style: italic;
            letter-spacing: 0.06em;
            margin-top: 0.75rem;
        }

        .thin-rule {
            width: 120px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
            margin: 1.5rem auto;
        }

        /* ── MAIN PANEL ── */
        .panel {
            background: var(--panel);
            backdrop-filter: blur(20px);
            border-radius: 1.5rem;
            border: 1px solid var(--border);
            padding: 2.25rem 2rem;
            box-shadow: 0 24px 64px rgba(0,0,0,0.45), inset 0 1px 0 rgba(212,175,55,0.08);
            margin-bottom: 2rem;
        }

        .field-label {
            display: block;
            font-size: 0.7rem;
            color: rgba(212,175,55,0.55);
            letter-spacing: 0.22em;
            text-transform: uppercase;
            margin-bottom: 0.75rem;
        }

        /* ── TEXTAREA ── */
        .scene-input {
            width: 100%;
            min-height: 110px;
            background: rgba(0,0,0,0.32);
            color: var(--cream);
            border: 1px solid rgba(212,175,55,0.22);
            border-radius: 0.75rem;
            padding: 1rem 1.2rem;
            font-family: Georgia, serif;
            font-size: 1rem;
            font-style: italic;
            line-height: 1.7;
            resize: vertical;
            transition: border-color 0.25s, box-shadow 0.25s;
            letter-spacing: 0.02em;
            margin-bottom: 1.75rem;
        }

        .scene-input::placeholder {
            color: rgba(168,197,160,0.38);
            font-style: italic;
        }

        .scene-input:focus {
            outline: none;
            border-color: rgba(212,175,55,0.45);
            box-shadow: 0 0 0 3px rgba(212,175,55,0.08);
        }

        /* ── SELECT ── */
        .select-wrap {
            position: relative;
            margin-bottom: 2rem;
        }

        .artist-select {
            width: 100%;
            padding: 0.95rem 2.8rem 0.95rem 1.2rem;
            background: rgba(0,0,0,0.32);
            color: var(--cream);
            border: 1px solid rgba(212,175,55,0.22);
            border-radius: 0.75rem;
            font-family: Georgia, serif;
            font-size: 1rem;
            font-style: italic;
            letter-spacing: 0.02em;
            cursor: pointer;
            appearance: none;
            transition: border-color 0.25s, box-shadow 0.25s;
        }

        .artist-select:focus {
            outline: none;
            border-color: rgba(212,175,55,0.45);
            box-shadow: 0 0 0 3px rgba(212,175,55,0.08);
        }

        .artist-select option { background: #0d2016; color: var(--cream); font-style: normal; }
        .artist-select optgroup { background: #0d2016; color: var(--gold); }

        .select-chevron {
            position: absolute;
            right: 1.1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gold);
            font-size: 0.75rem;
            pointer-events: none;
            opacity: 0.7;
        }

        /* Artist info line */
        .artist-info {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.6rem 1rem;
            background: rgba(45,90,39,0.1);
            border-radius: 0.5rem;
            border: 1px solid rgba(212,175,55,0.08);
            margin-top: 0.75rem;
            min-height: 2.5rem;
            transition: all 0.3s ease;
        }

        .info-flag { font-size: 1.2rem; flex-shrink: 0; }
        .info-text { font-size: 0.85rem; color: var(--sage); font-style: italic; }
        .info-years { font-size: 0.8rem; color: rgba(212,175,55,0.55); margin-left: auto; flex-shrink: 0; }

        /* ── GENERATE BUTTON ── */
        .generate-btn {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            padding: 1.1rem 2rem;
            background: linear-gradient(135deg, #253f21 0%, #3a6e32 50%, #253f21 100%);
            color: var(--cream);
            border: 1px solid rgba(212,175,55,0.4);
            border-radius: 9999px;
            font-family: Georgia, serif;
            font-size: 1.05rem;
            font-style: italic;
            letter-spacing: 0.04em;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 18px rgba(0,0,0,0.4), inset 0 1px 0 rgba(212,175,55,0.12);
        }

        .generate-btn:hover:not(:disabled) {
            transform: translateY(-2px) scale(1.015);
            border-color: rgba(212,175,55,0.6);
            color: var(--gold);
            box-shadow: 0 8px 28px rgba(0,0,0,0.5), 0 0 18px rgba(212,175,55,0.15);
        }

        .generate-btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

        .btn-icon { font-size: 1.2rem; }

        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .spinning { animation: spin 0.85s linear infinite; display: inline-block; }

        /* ── RESULTS ── */
        .results { display: none; }
        .results.show { display: block; }

        .results-intro {
            display: flex;
            align-items: baseline;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }

        .results-artist {
            font-size: 1.3rem;
            color: var(--cream);
            font-weight: normal;
        }

        .results-scene {
            font-size: 0.9rem;
            color: var(--sage);
            font-style: italic;
            opacity: 0.8;
        }

        /* Prompt cards */
        .prompts { display: flex; flex-direction: column; gap: 1.1rem; }

        .prompt-card {
            background: rgba(10,26,14,0.6);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 1.5rem;
            box-shadow: 0 10px 32px rgba(0,0,0,0.35);
            animation: fadeUp 0.45s ease both;
        }

        .prompt-card:nth-child(1) { animation-delay: 0.04s; }
        .prompt-card:nth-child(2) { animation-delay: 0.13s; }
        .prompt-card:nth-child(3) { animation-delay: 0.22s; }

        .card-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 0.9rem;
        }

        .card-num {
            font-size: 0.68rem;
            color: rgba(212,175,55,0.5);
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }

        .card-badge {
            font-size: 0.75rem;
            color: var(--sage);
            font-style: italic;
            background: rgba(45,90,39,0.18);
            padding: 0.25rem 0.7rem;
            border-radius: 9999px;
            border: 1px solid rgba(168,197,160,0.18);
        }

        .prompt-text {
            font-family: 'Courier New', monospace;
            font-size: 0.84rem;
            line-height: 1.85;
            color: #ddeedd;
            background: rgba(0,0,0,0.28);
            padding: 0.9rem 1rem;
            border-radius: 0.5rem;
            border: 1px solid rgba(255,255,255,0.05);
            margin-bottom: 0.9rem;
            word-wrap: break-word;
        }

        .copy-btn {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.7rem;
            background: linear-gradient(135deg, #253f21, #3a6e32);
            color: var(--cream);
            border: 1px solid rgba(212,175,55,0.22);
            border-radius: 0.45rem;
            font-family: Georgia, serif;
            font-size: 0.88rem;
            font-style: italic;
            cursor: pointer;
            transition: all 0.2s ease;
            letter-spacing: 0.03em;
        }

        .copy-btn:hover { background: linear-gradient(135deg, #3a6e32, #4a8e3f); transform: translateY(-1px); }
        .copy-btn.done { background: rgba(20,60,20,0.6); color: var(--sage); }

        /* ── FOOTER ── */
        .footer {
            text-align: center;
            padding: 2rem 0 1rem;
            color: var(--sage-dim);
            font-style: italic;
            font-size: 0.88rem;
            line-height: 2;
        }

        .footer-quote { font-size: 1rem; color: var(--sage); }
        .footer-copy { font-size: 0.74rem; color: rgba(212,175,55,0.38); letter-spacing: 0.05em; margin-top: 0.5rem; }

        @media (max-width: 580px) {
            .header-title { font-size: 2.1rem; }
            .panel { padding: 1.5rem 1.1rem; }
            .copyright { position: static; display: block; margin: 1rem auto 0; text-align: center; width: fit-content; }
        }
    </style>
</head>
<body>

<div class="copyright">© 2026 Tatiana Lychy</div>

<div class="page">

    <!-- HEADER -->
    <header class="header">
        <span class="header-ornament">✦ &nbsp; ✦ &nbsp; ✦</span>
        <h1 class="header-title">The Artist's <em>Vision</em></h1>
        <div class="thin-rule"></div>
        <p class="header-sub">Describe any scene · See it through a Master's eyes</p>
    </header>

    <!-- MAIN PANEL -->
    <div class="panel">

        <label class="field-label" for="scene-input">✦ &nbsp; Your scene</label>
        <textarea
            class="scene-input"
            id="scene-input"
            placeholder="Describe any scene — a morning kitchen, a cat by the window, a rainy street, a child in a garden…"
            oninput="onInputChange()"
        ></textarea>

        <label class="field-label" for="artist-select">✦ &nbsp; Choose a Master</label>
        <div class="select-wrap">
            <select class="artist-select" id="artist-select" onchange="onArtistChange()">
                <option value="" disabled selected>— Select an artist —</option>

                <optgroup label="✦ Renaissance">
                    <option value="davinci">Leonardo da Vinci</option>
                    <option value="michelangelo">Michelangelo</option>
                    <option value="raphael">Raphael</option>
                    <option value="botticelli">Sandro Botticelli</option>
                    <option value="durer">Albrecht Dürer</option>
                    <option value="bruegel">Pieter Bruegel the Elder</option>
                    <option value="bosch">Hieronymus Bosch</option>
                    <option value="eyck">Jan van Eyck</option>
                </optgroup>

                <optgroup label="✦ Mannerism">
                    <option value="elgreco">El Greco</option>
                </optgroup>

                <optgroup label="✦ Baroque">
                    <option value="caravaggio">Caravaggio</option>
                    <option value="rembrandt">Rembrandt van Rijn</option>
                    <option value="velazquez">Diego Velázquez</option>
                    <option value="vermeer">Johannes Vermeer</option>
                </optgroup>

                <optgroup label="✦ Neoclassical & Academic">
                    <option value="bouguereau">William-Adolphe Bouguereau</option>
                </optgroup>

                <optgroup label="✦ Romanticism">
                    <option value="delacroix">Eugène Delacroix</option>
                    <option value="friedrich">Caspar David Friedrich</option>
                    <option value="goya">Francisco Goya</option>
                    <option value="turner">William Turner</option>
                    <option value="aivazovsky">Ivan Aivazovsky</option>
                    <option value="dore">Gustave Doré</option>
                </optgroup>

                <optgroup label="✦ Realism">
                    <option value="manet">Édouard Manet</option>
                    <option value="courbet">Gustave Courbet</option>
                    <option value="corot">Camille Corot</option>
                    <option value="repin">Ilya Repin</option>
                    <option value="shishkin">Ivan Shishkin</option>
                    <option value="homer">Winslow Homer</option>
                </optgroup>

                <optgroup label="✦ Pre-Raphaelite">
                    <option value="waterhouse">John William Waterhouse</option>
                    <option value="rossetti">Dante Gabriel Rossetti</option>
                    <option value="millais">John Everett Millais</option>
                </optgroup>

                <optgroup label="✦ Impressionism">
                    <option value="monet">Claude Monet</option>
                    <option value="renoir">Pierre-Auguste Renoir</option>
                    <option value="degas">Edgar Degas</option>
                    <option value="pissarro">Camille Pissarro</option>
                    <option value="cassatt">Mary Cassatt</option>
                    <option value="morisot">Berthe Morisot</option>
                    <option value="zorn">Anders Zorn</option>
                </optgroup>

                <optgroup label="✦ Post-Impressionism">
                    <option value="vangogh">Vincent van Gogh</option>
                    <option value="cezanne">Paul Cézanne</option>
                    <option value="gauguin">Paul Gauguin</option>
                    <option value="seurat">Georges Seurat</option>
                    <option value="toulouse">Henri de Toulouse-Lautrec</option>
                </optgroup>

                <optgroup label="✦ Fauvism">
                    <option value="matisse">Henri Matisse</option>
                </optgroup>

                <optgroup label="✦ Expressionism">
                    <option value="munch">Edvard Munch</option>
                </optgroup>

                <optgroup label="✦ Symbolism">
                    <option value="redon">Odilon Redon</option>
                    <option value="moreau">Gustave Moreau</option>
                    <option value="vrubel">Mikhail Vrubel</option>
                    <option value="roerich">Nicholas Roerich</option>
                    <option value="nesterov">Mikhail Nesterov</option>
                </optgroup>

                <optgroup label="✦ Art Nouveau & Modernisme">
                    <option value="klimt">Gustav Klimt</option>
                    <option value="mucha">Alphonse Mucha</option>
                    <option value="beardsley">Aubrey Beardsley</option>
                    <option value="gaudi">Antoni Gaudí</option>
                    <option value="morris">William Morris</option>
                    <option value="jmking">Jessie M. King</option>
                    <option value="clarke">Harry Clarke</option>
                    <option value="sterrett">Virginia Frances Sterrett</option>
                </optgroup>

                <optgroup label="✦ Lyrical Landscape">
                    <option value="levitan">Isaac Levitan</option>
                    <option value="kuindzhi">Arkhip Kuindzhi</option>
                    <option value="polenov">Vasily Polenov</option>
                </optgroup>

                <optgroup label="✦ Fairy Tale & Folk Tale Art">
                    <option value="vasnetsov">Viktor Vasnetsov</option>
                    <option value="bilibin">Ivan Bilibin</option>
                    <option value="kustodiev">Boris Kustodiev</option>
                    <option value="larsson">Carl Larsson</option>
                    <option value="bauer">John Bauer</option>
                    <option value="crane">Walter Crane</option>
                    <option value="fordhj">Henry Justice Ford</option>
                    <option value="kittelsen">Theodor Kittelsen</option>
                    <option value="munthe">Gerhard Munthe</option>
                    <option value="polenova">Elena Polenova</option>
                    <option value="malyutin">Sergei Malyutin</option>
                    <option value="zvorykin">Boris Zworykin</option>
                    <option value="narbut">Georgy Narbut</option>
                </optgroup>

                <optgroup label="✦ Storybook Illustration">
                    <option value="potter">Beatrix Potter</option>
                    <option value="rackham">Arthur Rackham</option>
                    <option value="dulac">Edmund Dulac</option>
                    <option value="greenaway">Kate Greenaway</option>
                    <option value="goble">Warwick Goble</option>
                    <option value="jwsmith">Jessie Willcox Smith</option>
                    <option value="pyle">Howard Pyle</option>
                    <option value="crobinson">Charles Robinson</option>
                    <option value="whrobinson">William Heath Robinson</option>
                    <option value="anneanderson">Anne Anderson</option>
                    <option value="tenniel">John Tenniel</option>
                    <option value="beskow">Elsa Beskow</option>
                    <option value="monvel">Maurice Boutet de Monvel</option>
                </optgroup>

                <optgroup label="✦ Ukiyo-e Woodblock Print">
                    <option value="hokusai">Katsushika Hokusai</option>
                    <option value="hiroshige">Hiroshige</option>
                    <option value="utamaro">Utamaro</option>
                    <option value="koson">Ohara Koson</option>
                </optgroup>
            </select>
            <span class="select-chevron">▼</span>
        </div>

        <div class="artist-info" id="artist-info">
            <span class="info-flag" id="info-flag">🎨</span>
            <span class="info-text" id="info-text">Select a master to see their style</span>
            <span class="info-years" id="info-years"></span>
        </div>

        <div class="thin-rule" style="margin: 1.75rem auto;"></div>

        <button class="generate-btn" id="gen-btn" onclick="generate()" disabled>
            <span class="btn-icon" id="btn-icon">✦</span>
            <span id="btn-label">Enter a scene and choose an artist</span>
        </button>

    </div>

    <!-- RESULTS -->
    <div class="results" id="results">
        <div class="results-intro">
            <span class="results-artist" id="res-artist"></span>
            <span class="results-scene" id="res-scene"></span>
        </div>
        <div class="prompts" id="prompts-container"></div>
    </div>

    <!-- FOOTER -->
    <footer class="footer">
        <p class="footer-quote">Every ordinary moment deserves a masterpiece</p>
        <p>🌿 Created with love by Tatiana Lychy</p>
        <p class="footer-copy">© 2026 Tatiana Lychy · All Rights Reserved · For personal use only</p>
    </footer>

</div>

function rand(max) {
    const a = new Uint32Array(1);
    crypto.getRandomValues(a);
    return a[0] % max;
}

let currentScene = '';
let currentKey = '';
let prompts = [];

function onInputChange() {
    currentScene = document.getElementById('scene-input').value.trim();
    updateButton();
}

function onArtistChange() {
    currentKey = document.getElementById('artist-select').value;
    if (currentKey && A[currentKey]) {
        const a = A[currentKey];
        document.getElementById('info-flag').textContent = '🎨';
        document.getElementById('info-text').textContent = a.info;
        document.getElementById('info-years').textContent = a.years;
    } else {
        document.getElementById('info-flag').textContent = '🎨';
        document.getElementById('info-text').textContent = 'Select a master to see their style';
        document.getElementById('info-years').textContent = '';
    }
    updateButton();
}

function updateButton() {
    const btn = document.getElementById('gen-btn');
    const lbl = document.getElementById('btn-label');
    const ready = currentScene.length > 2 && currentKey && A[currentKey];
    btn.disabled = !ready;
    if (!currentScene) {
        lbl.textContent = 'Enter a scene and choose an artist';
    } else if (!currentKey) {
        lbl.textContent = 'Now choose an artist';
    } else {
        lbl.textContent = `Paint this scene through ${A[currentKey].name}'s eyes`;
    }
}

// BUILD PROMPT — scene always first and central
// ═══════════════════════════════════════════════
function buildPrompt(scene, a) {
    const times = [
        'in warm morning light', 'in golden afternoon light', 'in soft evening light',
        'in diffused overcast light', 'at quiet dawn', 'in gentle dusk light', 'under midday sun'
    ];
    const seasons = [' in spring', ' in summer', ' in autumn', ' in winter', ''];
    const qualities = [
        'richly detailed', 'masterfully composed', 'exquisitely rendered',
        'with extraordinary depth', 'with luminous detail', 'intimately observed'
    ];

    const t = times[rand(times.length)];
    const s = seasons[rand(seasons.length)];
    const q = qualities[rand(qualities.length)];

    // 5 distinct structures — scene always anchors the prompt
    const structures = [
        // Scene first, style as interpretive lens
        `${scene}${s} — painted by ${a.name} — ${a.technique}, ${a.palette}, ${a.mood}, ${q} --ar 9:16 --v 7`,

        // Scene interpreted through the master's specific vision
        `${scene}, ${t}${s}, ${a.style}: ${a.technique}, palette of ${a.palette}, ${a.mood}, ${q} --ar 9:16 --v 7`,

        // Scene as subject, full technical description
        `${a.style} — ${scene}${s}, ${t} — ${a.technique} — ${a.palette} — ${a.mood} --ar 9:16 --v 7`,

        // Scene in the master's world, technique highlighted
        `as ${a.name} would see and paint it: ${scene}${s}, ${t}, using ${a.technique}, colours of ${a.palette}, ${a.mood}, ${q} --ar 9:16 --v 7`,

        // Scene through the master's eyes — mood last
        `${scene} — ${a.style}, ${t}${s}, ${a.technique}, ${a.palette}, ${q}, ${a.mood} --ar 9:16 --v 7`,
    ];

    return structures[rand(structures.length)];
}

// ═══════════════════════════════════════════════
// GENERATE
// ═══════════════════════════════════════════════
function generate() {
    if (!currentScene || !currentKey || !A[currentKey]) return;

    const btn = document.getElementById('gen-btn');
    const icon = document.getElementById('btn-icon');
    const lbl = document.getElementById('btn-label');

    btn.disabled = true;
    icon.innerHTML = '<span class="spinning">✦</span>';
    lbl.textContent = 'Composing…';

    setTimeout(() => {
        const a = A[currentKey];
        // Generate 3 different prompts — ensure no duplicate structures
        const indices = [0,1,2,3,4].sort(() => rand(3)-1).slice(0,3);
        const times = ['in warm morning light','in golden afternoon light','in soft evening light','at quiet dawn','in gentle dusk light','under midday sun'];
        const seasons = [' in spring',' in summer',' in autumn',' in winter',''];
        const qualities = ['richly detailed','masterfully composed','exquisitely rendered','with extraordinary depth','with luminous detail','intimately observed'];

        prompts = indices.map(i => {
            const t = times[rand(times.length)];
            const s = seasons[rand(seasons.length)];
            const q = qualities[rand(qualities.length)];
            const structs = [
                `${currentScene}${s} — painted by ${a.name} — ${a.technique}, ${a.palette}, ${a.mood}, ${q} --ar 9:16 --v 7`,
                `${currentScene}, ${t}${s}, ${a.style}: ${a.technique}, palette of ${a.palette}, ${a.mood}, ${q} --ar 9:16 --v 7`,
                `${a.style} — ${currentScene}${s}, ${t} — ${a.technique} — ${a.palette} — ${a.mood} --ar 9:16 --v 7`,
                `as ${a.name} would see and paint it: ${currentScene}${s}, ${t}, using ${a.technique}, colours of ${a.palette}, ${a.mood}, ${q} --ar 9:16 --v 7`,
                `${currentScene} — ${a.style}, ${t}${s}, ${a.technique}, ${a.palette}, ${q}, ${a.mood} --ar 9:16 --v 7`,
            ];
            return structs[i];
        });

        const scenePreview = currentScene.length > 55 ? currentScene.slice(0,52)+'…' : currentScene;
        document.getElementById('res-artist').textContent = a.name;
        document.getElementById('res-scene').textContent = `· "${scenePreview}"`;

        const container = document.getElementById('prompts-container');
        container.innerHTML = '';

        prompts.forEach((p, i) => {
            const card = document.createElement('div');
            card.className = 'prompt-card';
            card.innerHTML = `
                <div class="card-top">
                    <span class="card-num">✦ &nbsp; Prompt ${i+1} of 3</span>
                    <span class="card-badge">${a.name}</span>
                </div>
                <div class="prompt-text">${p}</div>
                <button class="copy-btn" id="cb-${i}" onclick="copyP(${i})">
                    <span>📋</span><span>Copy to Clipboard</span>
                </button>`;
            container.appendChild(card);
        });

        const results = document.getElementById('results');
        results.classList.add('show');
        results.scrollIntoView({ behavior:'smooth', block:'start' });

        btn.disabled = false;
        icon.textContent = '✦';
        lbl.textContent = `Generate again · ${a.name}`;
    }, 700);
}

// ═══════════════════════════════════════════════
// COPY
// ═══════════════════════════════════════════════
function copyP(i) {
    const text = prompts[i];
    const btn = document.getElementById(`cb-${i}`);
    navigator.clipboard.writeText(text).then(() => {
        btn.classList.add('done');
        btn.innerHTML = '<span>✓</span><span>Copied!</span>';
        setTimeout(() => { btn.classList.remove('done'); btn.innerHTML = '<span>📋</span><span>Copy to Clipboard</span>'; }, 2000);
    }).catch(() => {
        const ta = document.createElement('textarea');
        ta.value = text; ta.style.cssText = 'position:fixed;left:-9999px';
        document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
        btn.innerHTML = '<span>✓</span><span>Copied!</span>';
        setTimeout(() => { btn.innerHTML = '<span>📋</span><span>Copy to Clipboard</span>'; }, 2000);
    });
}
</script>
