        const lightings     = shuffleArray(originalLightings);
        const phenomena     = shuffleArray(originalPhenomena);
        const aesthetics    = shuffleArray(originalAesthetics);
        const colors        = shuffleArray(originalColors);
        const details       = shuffleArray(originalDetails);
        const emotions      = shuffleArray(originalEmotions);

        // ====== STATE ======
        let idea = null;
        let isGenerating = false;
        let copied = false;
        let generatedThisSession = 0;
        let copyTimer = null;

        function freshUsed() {
            return {
                characterTypes: new Set(), clothingStyles: new Set(), actions: new Set(),
                objects: new Set(), animals: new Set(), locations: new Set(),
                moods: new Set(), lightings: new Set(), phenomena: new Set(),
                aesthetics: new Set(), colors: new Set(), details: new Set(), emotions: new Set()
            };
        }
        let usedIndices = freshUsed();

        function getRandomUnusedIndex(arrayLength, usedSet) {
            if (usedSet.size >= arrayLength) {
                return getTrulyRandomInt(arrayLength);
            }
            let index, attempts = 0;
            do {
                index = getTrulyRandomInt(arrayLength);
                attempts++;
                if (attempts > 100) return index;
            } while (usedSet.has(index));
            return index;
        }

        // ====== GENERATE ======
        function generateIdea() {
            if (isGenerating) return;
            isGenerating = true;
            copied = false;
            render();

            setTimeout(function () {
                const characterTypeIdx = getRandomUnusedIndex(characterTypes.length, usedIndices.characterTypes);
                const clothingIdx      = getRandomUnusedIndex(clothingStyles.length, usedIndices.clothingStyles);
                const actionIdx        = getRandomUnusedIndex(actions.length, usedIndices.actions);
                const objectIdx        = getRandomUnusedIndex(objects.length, usedIndices.objects);
                const animalIdx        = getRandomUnusedIndex(animals.length, usedIndices.animals);
                const locationIdx      = getRandomUnusedIndex(locations.length, usedIndices.locations);
                const moodIdx          = getRandomUnusedIndex(moods.length, usedIndices.moods);
                const lightingIdx      = getRandomUnusedIndex(lightings.length, usedIndices.lightings);
                const phenomenonIdx    = getRandomUnusedIndex(phenomena.length, usedIndices.phenomena);
                const aestheticIdx     = getRandomUnusedIndex(aesthetics.length, usedIndices.aesthetics);
                const colorIdx         = getRandomUnusedIndex(colors.length, usedIndices.colors);
                const detailIdx        = getRandomUnusedIndex(details.length, usedIndices.details);
                const emotionIdx       = getRandomUnusedIndex(emotions.length, usedIndices.emotions);

                usedIndices.characterTypes.add(characterTypeIdx);
                usedIndices.clothingStyles.add(clothingIdx);
                usedIndices.actions.add(actionIdx);
                usedIndices.objects.add(objectIdx);
                usedIndices.animals.add(animalIdx);
                usedIndices.locations.add(locationIdx);
                usedIndices.moods.add(moodIdx);
                usedIndices.lightings.add(lightingIdx);
                usedIndices.phenomena.add(phenomenonIdx);
                usedIndices.aesthetics.add(aestheticIdx);
                usedIndices.colors.add(colorIdx);
                usedIndices.details.add(detailIdx);
                usedIndices.emotions.add(emotionIdx);

                const characterType = characterTypes[characterTypeIdx];
                const clothing = clothingStyles[clothingIdx];
                const action = actions[actionIdx];
                const object = objects[objectIdx];
                const animal = animals[animalIdx];
                const location = locations[locationIdx];
                const mood = moods[moodIdx];
                const lighting = lightings[lightingIdx];
                const phenomenon = phenomena[phenomenonIdx];
                const aesthetic = aesthetics[aestheticIdx];
                const color = colors[colorIdx];
                const detail = details[detailIdx];
                const emotion = emotions[emotionIdx];

                const structures = [
                    `${characterType} ${clothing} ${action} with ${object} beside ${animal} in ${location}, ${mood} atmosphere, ${lighting}, ${phenomenon}, ${aesthetic}, color palette: ${color}, ${detail}, ${emotion}, saturated colors, rich color palette, beautiful composition --ar 9:16 --v 7`,
                    `${characterType} ${clothing} beside ${animal}, ${action} with ${object} in ${location}, ${phenomenon}, ${lighting}, ${mood} atmosphere, ${aesthetic}, ${color} colors, ${detail}, ${emotion}, saturated colors, beautiful composition --ar 9:16 --v 7`,
                    `in ${location}, ${characterType} ${clothing} ${action} with ${object} and ${animal}, ${mood} mood, ${lighting}, ${phenomenon} surrounding them, ${aesthetic}, color palette: ${color}, ${detail}, capturing ${emotion}, saturated colors, rich color palette --ar 9:16 --v 7`
                ];
                const prompt = structures[getTrulyRandomInt(structures.length)];

                const fullText = `${characterType} ${action} ${object} ${location} ${phenomenon}`.toLowerCase();
                const tags = [];
                if (fullText.includes('valentine') || fullText.includes('heart') || fullText.includes('love') || fullText.includes('rose')) tags.push('valentine');
                if (fullText.includes('spring') || fullText.includes('blossom') || fullText.includes('flower')) tags.push('spring');
                if (fullText.includes('bunny') || fullText.includes('rabbit')) tags.push('bunnies');
                if (fullText.includes('cat') || fullText.includes('kitten') || fullText.includes('fox') || fullText.includes('deer')) tags.push('animals');
                if (fullText.includes('cottage') || fullText.includes('garden') || fullText.includes('countryside')) tags.push('cottagecore');
                if (fullText.includes('victorian') || fullText.includes('vintage')) tags.push('vintage');
                tags.push('romantic', 'sweet');
                const finalTags = tags.slice(0, 6);

                const title = `${characterType} ${action}`.split(' ').slice(0, 6).join(' ');
                const titleCapitalized = title.charAt(0).toUpperCase() + title.slice(1);

                idea = {
                    title: titleCapitalized,
                    description: `${characterType} ${clothing}, ${action} with ${object} beside ${animal} in ${location}. ${emotion} in ${aesthetic}.`,
                    tags: finalTags,
                    prompt: prompt
                };

                generatedThisSession += 1;
                isGenerating = false;
                render();
            }, 1000);
        }

        // ====== RESET ======
        function handleReshuffle() {
            usedIndices = freshUsed();
            generatedThisSession = 0;
            idea = null;
            copied = false;
            render();
        }

        // ====== COPY ======
        async function copyToClipboard(text) {
            try {
                await navigator.clipboard.writeText(text);
                markCopied();
            } catch (err) {
                try {
                    const textArea = document.createElement('textarea');
                    textArea.value = text;
                    textArea.style.position = 'fixed';
                    textArea.style.left = '-999999px';
                    document.body.appendChild(textArea);
                    textArea.select();
                    document.execCommand('copy');
                    document.body.removeChild(textArea);
                    markCopied();
                } catch (fallbackErr) {
                    alert('Failed to copy. Please copy manually.');
                }
            }
        }

        function markCopied() {
            copied = true;
            render();
            if (copyTimer) clearTimeout(copyTimer);
            copyTimer = setTimeout(function () {
                copied = false;
                render();
            }, 2000);
        }

        // ====== RENDER ======
        function el(tag, props, children) {
            const node = document.createElement(tag);
            if (props) {
                for (const k in props) {
                    if (k === 'class') node.className = props[k];
                    else if (k === 'style') node.setAttribute('style', props[k]);
                    else if (k === 'text') node.textContent = props[k];
                    else node.setAttribute(k, props[k]);
                }
            }
            (children || []).forEach(function (c) {
                if (typeof c === 'string') node.appendChild(document.createTextNode(c));
                else if (c) node.appendChild(c);
            });
            return node;
        }

        function render() {
            // stats
            document.getElementById('count').textContent = generatedThisSession;

            // generate button state
            const genIcon = document.getElementById('genIcon');
            const genText = document.getElementById('genText');
            const genBtn = document.getElementById('generateBtn');
            genIcon.textContent = isGenerating ? '🔄' : '✨';
            genText.textContent = isGenerating ? 'Generating Magic...' : 'Generate New Idea';
            genText.className = isGenerating ? 'spin' : '';
            genBtn.disabled = isGenerating;

            // result area
            const result = document.getElementById('result');
            result.innerHTML = '';

            if (isGenerating) return;

            if (idea) {
                const card = el('div', { class: 'idea-card' }, [
                    el('div', { class: 'idea-header' }, [
                        el('div', { class: 'icon-box' }, [
                            el('span', { style: 'font-size: 1.5rem;', text: '✨' })
                        ]),
                        el('div', { style: 'flex: 1;' }, [
                            el('h2', { class: 'idea-title', text: idea.title })
                        ])
                    ]),
                    el('div', { class: 'description-box' }, [
                        el('p', { class: 'description-text', text: idea.description })
                    ]),
                    el('div', { class: 'tags-container' },
                        idea.tags.map(function (tag) {
                            return el('span', { class: 'tag', text: '#' + tag });
                        })
                    ),
                    (function () {
                        const copyBtn = el('button', { class: 'copy-button' }, [
                            el('span', { text: copied ? '✓' : '📋' }),
                            el('span', { text: copied ? 'Copied!' : 'Copy to Clipboard' })
                        ]);
                        copyBtn.addEventListener('click', function () { copyToClipboard(idea.prompt); });
                        return el('div', { class: 'prompt-box' }, [
                            el('div', { class: 'prompt-header' }, [
                                el('span', { text: '🖼️' }),
                                el('span', { text: 'AI Art Prompt (ready to copy)' })
                            ]),
                            el('p', { class: 'prompt-text', text: idea.prompt }),
                            copyBtn
                        ]);
                    })()
                ]);
                result.appendChild(card);
            } else {
                const placeholder = el('div', { class: 'text-center', style: 'color: #e9d5ff; margin-bottom: 2rem;' }, [
                    el('p', { style: 'font-size: 1.125rem; margin-bottom: 1rem;', text: '🎨 Click the button above to generate your first idea!' }),
                    el('p', { style: 'font-size: 0.875rem; color: #d8b4fe;', text: 'Each idea is unique and full of cosy charm!' })
                ]);
                result.appendChild(placeholder);
            }
        }

        // ====== INIT ======
        document.getElementById('generateBtn').addEventListener('click', generateIdea);
        document.getElementById('resetBtn').addEventListener('click', handleReshuffle);
        render();
    </script>
</body>
</html>
